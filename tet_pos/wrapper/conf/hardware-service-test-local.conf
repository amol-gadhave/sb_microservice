#********************************************************************
# Wrapper Windows NT/2000/XP Service Properties
#********************************************************************
# WARNING - Do not modify any of these properties when an application
#  using this configuration file has been installed as a service.
#  Please uninstall the service before modifying this section.  The
#  service can then be reinstalled.

# Name of the service
wrapper.ntservice.name=POSHardware

# Display name of the service
wrapper.ntservice.displayname=Xstore POS Hardware Service

# Description of the service
wrapper.ntservice.description=Controls POS hardware for use with Xstore Thin Client

# Allow command files to be used to restart, exit, dump, etc
wrapper.commandfile=./hardware-service-test-local.command

# Specify a file to create a monitor. If the file is deleted, exit the application.
wrapper.anchorfile=./tmp/hardware-service-test-local.anchor

wrapper.pidfile=./tmp/hardware-service-test-local.wrapper.pid
wrapper.java.pidfile=./tmp/hardware-service-test-local.java.pid
wrapper.java.statusfile=./tmp/hardware-service-test-local.java.status


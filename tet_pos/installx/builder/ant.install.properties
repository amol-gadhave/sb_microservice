
# INSTALLX BUILDER ANT.INSTALL.PROPERTIES

# Distribution directory
distDir =

# InstallX Installation Type
x.type = install,update

# InstallX Source Artifact Type
x.source.type = folders
# Xstore Base Version
x.version = 21.0.3.0.45
# Customer build version
cust.version = 3.2.10

# Patch version
patch.version = 0.0

#XA-1176
no.container.image=true

# Source Files - File mode (used when x.source.type == files)
# Xstore base build
build.xstore = C:\\InstallX\\artifacts\\21.0.3.0.45\\xstore-21.0.3.0.45.tar.gz
# Xstore base database build
build.db = C:\\InstallX\\artifacts\\21.0.3.0.45\\dbmake-21.0.3.0.45.zip
# Xenvironment customer build file
build.xenvcust = 
# Xstore customer build
build.cust = C:\\InstallX\\artifacts\\21.0.3.0.45\\lev-build.1.zip
# Xcenter war file
build.xcwar = C:\\InstallX\\artifacts\\21.0.3.0.45\\xcenter.war
# Xadmin ear file
build.xadmin = C:\\InstallX\\artifacts\\21.0.3.0.45\\xadmin.war
# Xadmin DB zip
build.xadmindb = C:\\InstallX\\artifacts\\21.0.3.0.45\\xadmin-database.zip
# Xservices zip
build.services = C:\\InstallX\\artifacts\\21.0.3.0.45\\xservices.zip
# Xservices war
build.services.war = C:\\InstallX\\artifacts\\21.0.3.0.45\\xservices.war
# Xenvironment zip
build.xenvironment = C:\\InstallX\\artifacts\\21.0.3.0.45\\xenv-21.0.3.0.45.zip
# Hardware Service zip
build.hardware-service = C:\\InstallX\\artifacts\\21.0.3.0.45\\hwserv-21.0.3.0.45.zip
# Xstore Electron zip
build.xstore-electron = C:\\InstallX\\artifacts\\21.0.3.0.45\\xstore-electron-21.0.3.0.45.zip

# Source Files - Folder mode (used when x.source.type == folders)
# Xstore base build extracted
build.xstore.folder = ../../../releases/21.0.3.0.45/xstore
# Xstore base database build extracted
build.db.folder = ../../../releases/21.0.3.0.45/dbmake
# Xenvironment customer build
build.xenvcust.folder = ../workspace/lev_xenvironment/dist
# DirectoryInput Xstore Electron Build Folder
build.xstore-electron.folder = 
# Xstore customer build
build.cust.folder = ../workspace/lev_pos/dist
# Xcenter war extracted
build.xcwar.folder = ../../../releases/21.0.3.0.45/xcenter
# Xadmin ear extracted
build.xadmin.folder = ../../../releases/21.0.3.0.45/xadmin
# Xadmin DB zip extracted
build.xadmindb.folder = ../../../releases/21.0.3.0.45/xadmin-database
# Xservices zip extracted
build.services.folder = ../../../releases/21.0.3.0.45/xservices-install
# Xservices war extracted
build.services.war.folder = ../../../releases/21.0.3.0.45/xservices
# Xenvironment zip extracted
build.xenvironment.folder = ../../../releases/21.0.3.0.45/xenvironment
# Hardware Service zip extracted
build.hardware-service.folder = ../../../releases/21.0.3.0.45/hwserv

#Start RETLDEV-2
# Xstore patch jar file
patch.xstore = ../workspace/lev_pos/lib/patch/*.jar
# Xstore patch db update script
patch.db = 
# Xstore patch custom task file
patch.customscript = 

#Do Not delete lev custom properties
#Lev Custom Xstore Patch Properties
lev.remove.old.patches.for.auto.patch.deployment=true
#Lev Custom Xstore Mobile property
lev.mobile.install.dir=/xstore-mobile
#END RETLDEV-2


#XSA23-836 & XA-576
#To create mini build change the value of lev.mini.build.create to true. 
#To copy country specific properties and update xstore.properties, change the value of 'lev.mini.build.update.xstore.properties' to true
#To create rollback jar for mini build please change the status of 'lev.mini.build.rollback=true'
#lev.mini.build.update.xstore.properties and  lev.mini.build.rollback  will only be considered when parent property lev.mini.build.create must be true.

lev.mini.build.create=true
lev.mini.build.update.xstore.properties=false
lev.mini.build.rollback=false

# Customer ID all caps
customer.id = LEV
# Customer Salt
customerId.salt = LEVICORP
# Brand name (If Applicable)
customer.brand = 
# Xcenter Org Id for replacement in SQL scripts
# For multiple Orgs, use a comma-separate list with no spaces (i.e. 1,2,3)
xcenter.org = 1

# Installation Database Platform
platform.db = oracle
# Should InstallX create the register database?
db.create = true

# Xstore Mobile components should be included in the pos installer
mobile.components.enabled = true
# Path to Xstore Mobile app file for Android
xstore.mobile.android.file=
# Path to Xstore Mobile app file for iOS
xstore.mobile.ios.file=
# Path to Xstore Mobile app file for Windows
xstore.mobile.windows.file=


# Do not launch Xstore after installation
donot.launch.xstore = false
# Do not delete the cust_config directory during installation
donot.clean.cust_config = true
# Host Interface download zip
file.download = 
# Do not maintain receipt logo file during upgrades/updates
donot.maintain.receiptLogo = false
# Do not maintain configurator patch files during upgrades
upgrade.removeConfiguratorPatches = false

is.xadmin.custom = true
xadmin.custom.dir = ../workspace/lev_xcenter-admin/target/overlay
xadmin.custom.dbscript.dir = ../workspace/lev_xcenter-admin/database

is.xcenter.custom = true
xcenter.custom.dir = ../workspace/lev_xcenter/target/overlay
xcenter.custom.dbscript.dir = ../workspace/lev_xcenter/database

xservices.overlay.dir = ../workspace/lev_xservices/target/overlay
xservices.install.overlay.dir = ../workspace/lev_xservices/src/main/xservices-install

hardware.service.overlay.dir = ../workspace/lev_hardware-service/target/dist

# Include libraries for AJB
ajb = false
# Include JPOS drivers and supporting files for Crossmatch
crossmatch = false
# Include JPOS drivers and supporting files for Epson
epson = true
# Include JPOS drivers and supporting files for Verifone MX 8XX or 9XX
verifone = false
# Include drivers for Zebra label printers
zebra = false

# Platform support exclusion
disable.32bit.linux = false
disable.64bit.linux = false
disable.32bit.windows = false
disable.64bit.windows = false

# Component Selection
package-dl = true
package-genkeys = true
package-jrepackager = true
package-pos = true
package-poslog = true
package-xadmin = true
package-xcenter = true
package-xenvironment = true
package-xservices = true


## 
## DO NOT EDIT BELOW
##
ant.install.config.version = 1.0
Intro-targets = init,
Files-targets = unzip,
PatchFiles-targets = package-patch,
DistDir-targets = clean-temp,
clean-temp = true
